<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻醉藥物測驗系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:      #0a0c0f;
    --bg-panel:     #111418;
    --bg-card:      #161b22;
    --bg-hover:     #1c232d;
    --border:       #252d38;
    --border-light: #2e3a4a;
    --text-primary: #e8edf2;
    --text-secondary:#8b9ab0;
    --text-muted:   #4a5568;
    --accent-cyan:  #38bdf8;
    --accent-green: #4ade80;
    --accent-amber: #fbbf24;
    --accent-red:   #f87171;
    --accent-purple:#a78bfa;
    --accent-teal:  #2dd4bf;

    --cat-propofol: #38bdf8;
    --cat-etomidate:#a78bfa;
    --cat-ketamine: #fbbf24;
    --cat-midazolam:#4ade80;
    --cat-opioid:   #fb923c;
    --cat-nmb:      #f472b6;
    --cat-volatile: #2dd4bf;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    background: #0a0c0f !important;
  }

  body {
    background: #0a0c0f !important;
    color: var(--text-primary);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCREENS ── */
  .screen {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #0a0c0f;
  }
  .screen.hidden { display: none; }

  /* ══════════════════════════════
     WELCOME SCREEN
  ══════════════════════════════ */
  #welcome {
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .logo-line {
    width: 60px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
    margin: 0 auto 32px;
  }

  .welcome-title {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .welcome-title span { color: var(--accent-cyan); }

  .welcome-sub {
    color: var(--text-secondary);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    text-align: center;
    margin-bottom: 48px;
    font-weight: 300;
    letter-spacing: 0.1em;
  }

  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    max-width: 860px;
    width: 100%;
    margin-bottom: 48px;
  }

  .cat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .cat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .cat-card:hover { border-color: var(--accent); background: var(--bg-hover); transform: translateY(-2px); }
  .cat-card:hover::before { opacity: 1; }
  .cat-card.selected {
    border-color: var(--accent);
    background: var(--bg-hover);
  }
  .cat-card.selected::before { opacity: 1; }
  .cat-card.selected::after {
    content: '✓';
    position: absolute;
    top: 10px; right: 12px;
    color: var(--accent);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
  }

  .cat-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--accent);
    margin-bottom: 4px;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .cat-name {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 3px;
  }
  .cat-eng {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .cat-count {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  .mode-row {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .mode-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
  }
  .mode-btn:hover, .mode-btn.active {
    border-color: var(--accent-cyan);
    color: var(--accent-cyan);
    background: rgba(56,189,248,0.06);
  }

  .start-btn {
    background: var(--accent-cyan);
    color: #000;
    border: none;
    padding: 14px 48px;
    border-radius: 8px;
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .start-btn:hover {
    background: #7dd3fc;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(56,189,248,0.3);
  }
  .start-btn:disabled {
    background: var(--border);
    color: var(--text-muted);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ══════════════════════════════
     QUIZ SCREEN
  ══════════════════════════════ */
  #quiz { padding: 0; }

  .quiz-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(10,12,15,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
  }

  .quiz-header-inner {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .q-index {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .progress-bar-wrap {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-teal));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .timer-display {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    min-width: 56px;
    text-align: right;
  }
  .timer-display.warn { color: var(--accent-amber); }
  .timer-display.danger { color: var(--accent-red); animation: pulse 0.6s ease infinite alternate; }

  @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

  .score-badge {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent-green);
    white-space: nowrap;
  }

  /* ── Question card ── */
  .quiz-body {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .cat-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--accent);
    color: var(--accent);
    background: rgba(0,0,0,0.3);
    margin-bottom: 20px;
  }
  .cat-badge::before { content: '◆'; font-size: 8px; }

  .question-text {
    font-size: clamp(17px, 2.5vw, 21px);
    font-weight: 600;
    line-height: 1.7;
    margin-bottom: 32px;
    color: #f0f4f8;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: all 0.18s;
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    color: var(--text-primary);
    line-height: 1.6;
    width: 100%;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--border-light);
    background: var(--bg-hover);
    transform: translateX(3px);
  }
  .option-btn:disabled { cursor: default; }

  .opt-key {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    width: 22px;
    height: 22px;
    border-radius: 4px;
    background: var(--border);
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.18s;
  }

  .option-btn.correct {
    border-color: var(--accent-green);
    background: rgba(74,222,128,0.08);
  }
  .option-btn.correct .opt-key {
    background: var(--accent-green);
    color: #000;
  }

  .option-btn.wrong {
    border-color: var(--accent-red);
    background: rgba(248,113,113,0.08);
  }
  .option-btn.wrong .opt-key {
    background: var(--accent-red);
    color: #000;
  }

  .option-btn.missed {
    border-color: var(--accent-green);
    background: rgba(74,222,128,0.04);
    opacity: 0.7;
  }
  .option-btn.missed .opt-key {
    background: rgba(74,222,128,0.3);
    color: var(--accent-green);
  }

  /* ── Explanation ── */
  .explanation-box {
    margin-top: 24px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent-cyan);
    border-radius: 0 10px 10px 0;
    padding: 20px 22px;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .explanation-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--accent-cyan);
    margin-bottom: 8px;
  }
  .explanation-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-secondary);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
  }

  .next-btn {
    margin-top: 24px;
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-primary);
    padding: 12px 32px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .next-btn:hover {
    border-color: var(--accent-cyan);
    color: var(--accent-cyan);
    background: rgba(56,189,248,0.05);
  }
  .next-btn .arrow { transition: transform 0.2s; }
  .next-btn:hover .arrow { transform: translateX(4px); }

  /* ── Feedback flash ── */
  .feedback-flash {
    position: fixed;
    top: 80px; right: 24px;
    padding: 10px 18px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    z-index: 100;
    animation: flashIn 0.2s ease, flashOut 0.3s ease 1.5s forwards;
    pointer-events: none;
  }
  .feedback-flash.correct { background: rgba(74,222,128,0.15); border: 1px solid var(--accent-green); color: var(--accent-green); }
  .feedback-flash.wrong   { background: rgba(248,113,113,0.15); border: 1px solid var(--accent-red);   color: var(--accent-red); }
  @keyframes flashIn  { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes flashOut { from { opacity: 1; } to { opacity: 0; } }

  /* ══════════════════════════════
     RESULTS SCREEN
  ══════════════════════════════ */
  #results {
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .results-title {
    font-size: 14px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 20px;
    text-align: center;
  }

  .score-ring-wrap {
    position: relative;
    width: 160px; height: 160px;
    margin: 0 auto 32px;
  }
  .score-ring {
    transform: rotate(-90deg);
  }
  .score-ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
  .score-ring-fill {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 440;
    stroke-dashoffset: 440;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .score-ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .score-num {
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
  }
  .score-denom {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }

  .rank-badge {
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 8px;
  }
  .rank-sub {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'Noto Sans TC', sans-serif;
    text-align: center;
    margin-bottom: 40px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 500px;
    width: 100%;
    margin-bottom: 40px;
  }
  .stat-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .stat-val {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Noto Sans TC', sans-serif;
    letter-spacing: 0.05em;
  }

  /* Category breakdown */
  .cat-breakdown {
    max-width: 500px;
    width: 100%;
    margin-bottom: 40px;
  }
  .breakdown-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .breakdown-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .breakdown-cat {
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text-secondary);
    width: 100px;
    flex-shrink: 0;
  }
  .breakdown-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .breakdown-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease 0.5s;
  }
  .breakdown-pct {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    width: 32px;
    text-align: right;
  }

  /* Review wrong */
  .review-section {
    max-width: 800px;
    width: 100%;
    margin-bottom: 40px;
  }
  .review-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    cursor: pointer;
    user-select: none;
  }
  .review-header-text {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
  }
  .review-toggle {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
    transition: transform 0.2s;
  }
  .review-toggle.open { transform: rotate(180deg); }

  .review-list { display: none; flex-direction: column; gap: 12px; }
  .review-list.open { display: flex; }

  .review-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent-red);
    border-radius: 0 8px 8px 0;
    padding: 16px 18px;
  }
  .review-q {
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 10px;
    color: var(--text-primary);
  }
  .review-answer-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .review-answer {
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    padding: 4px 10px;
    border-radius: 4px;
  }
  .review-answer.user-wrong { background: rgba(248,113,113,0.15); color: var(--accent-red); }
  .review-answer.correct-ans { background: rgba(74,222,128,0.15); color: var(--accent-green); }

  .result-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .result-btn {
    padding: 12px 28px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    transition: all 0.2s;
  }
  .result-btn.primary {
    background: var(--accent-cyan);
    color: #000;
    border: none;
    font-weight: 600;
  }
  .result-btn.primary:hover { background: #7dd3fc; }
  .result-btn.secondary {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-secondary);
  }
  .result-btn.secondary:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }

  /* ── Util ── */
  hr.divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
    max-width: 500px;
    width: 100%;
  }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .quiz-header-inner { gap: 12px; }
    .quiz-body { padding: 24px 16px 80px; }
  }

  /* ── Font size toggle ── */
  .font-toggle {
    position: fixed;
    bottom: 24px;
    right: 20px;
    z-index: 200;
    display: flex;
    align-items: center;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 24px;
    padding: 4px;
    gap: 2px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .font-toggle-btn {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 20px;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.15s;
    line-height: 1;
  }
  .font-toggle-btn.active {
    background: var(--accent-cyan);
    color: #000;
    font-weight: 600;
  }
  .font-toggle-btn:hover:not(.active) {
    color: var(--text-primary);
    background: var(--bg-hover);
  }

  /* Font size classes applied to body */
  body.fs-sm { font-size: 14px; }
  body.fs-md { font-size: 16px; }
  body.fs-lg { font-size: 19px; }

  body.fs-sm .question-text  { font-size: 15px; }
  body.fs-md .question-text  { font-size: 18px; }
  body.fs-lg .question-text  { font-size: 22px; }

  body.fs-sm .option-btn     { font-size: 13px; padding: 13px 16px; }
  body.fs-md .option-btn     { font-size: 15px; }
  body.fs-lg .option-btn     { font-size: 18px; padding: 18px 22px; }

  body.fs-sm .explanation-text { font-size: 13px; }
  body.fs-md .explanation-text { font-size: 14px; }
  body.fs-lg .explanation-text { font-size: 17px; }

  /* ── Clinical badge ── */
  .diff-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .diff-1 { background: rgba(74,222,128,0.15);  color: var(--accent-green);  border: 1px solid rgba(74,222,128,0.3); }
  .diff-2 { background: rgba(251,191,36,0.15);  color: var(--accent-amber);  border: 1px solid rgba(251,191,36,0.3); }
  .diff-3 { background: rgba(248,113,113,0.15); color: var(--accent-red);    border: 1px solid rgba(248,113,113,0.3); }
</style>
</head>
<body>

<!-- Font size toggle (always visible) -->
<div class="font-toggle">
  <button class="font-toggle-btn" data-fs="fs-sm" onclick="setFont(this)">小</button>
  <button class="font-toggle-btn active" data-fs="fs-md" onclick="setFont(this)">中</button>
  <button class="font-toggle-btn" data-fs="fs-lg" onclick="setFont(this)">大</button>
</div>

<!-- ══════════════ WELCOME ══════════════ -->
<div id="welcome" class="screen">
  <div class="logo-line"></div>
  <h1 class="welcome-title">麻醉藥物<span>測驗系統</span></h1>

{cat:'clinical', diff:2, q:'【大面積燒傷 RSI 肌鬆劑選擇】\n32歲男性，3天前大面積燒傷（60% TBSA），現需要緊急插管。以下哪種肌鬆劑選擇最安全？',
 opts:['Succinylcholine 1.5 mg/kg — 起效最快','Rocuronium 0.6 mg/kg — 標準劑量','Rocuronium 1.2 mg/kg — 高劑量快速起效','Succinylcholine 2 mg/kg — 增量確保效果'],
 ans:2, exp:'大面積燒傷患者在傷後 48 小時至數月內，因去神經化導致菸鹼受體上調，使用 Succinylcholine 可引起致命性高鉀血症（排除 A 和 D）。此患者已燒傷 3 天，Succinylcholine 絕對禁忌。Rocuronium 1.2 mg/kg（RSI 劑量）可在約 60 秒內達到插管條件，有 Sugammadex 可逆轉。Rocuronium 0.6 mg/kg 起效太慢，不適合 RSI。'},

{cat:'clinical', diff:3, q:'【多重禁忌的複雜患者】\n55歲男性，已知惡性高熱家族史，合併重度哮喘和輕度腎功能不全，需要全身麻醉進行腹部手術。哪種方案最合適？',
 opts:['Sevoflurane 吸入誘導 + Succinylcholine + Fentanyl','Propofol TIVA + Rocuronium + Remifentanil','Desflurane + Rocuronium + Fentanyl','Propofol 誘導 + Sevoflurane 維持 + Rocuronium'],
 ans:1, exp:'惡性高熱家族史禁用所有揮發性麻醉劑和 Succinylcholine，排除 A、C、D。Propofol TIVA 避免觸發 MH；Rocuronium 為非去極化肌鬆劑，安全；Remifentanil 由非特異性酯酶代謝，不受腎功能影響，且具有支氣管擴張協同效應（減少刺激）。此組合同時解決三個問題：MH 風險、哮喘、腎功能不全。'},

{cat:'clinical', diff:3, q:'【緊急剖腹產全身麻醉 RSI】\n30歲產婦，胎兒嚴重心動過緩，需要緊急 1 級剖腹產，脊椎麻醉來不及。產婦血壓正常，無已知藥物過敏。最佳 RSI 方案是？',
 opts:['Propofol 2–2.8 mg/kg + Succinylcholine 1–1.5 mg/kg，胎兒娩出前不給鴉片類','Ketamine 2 mg/kg + Rocuronium 1.2 mg/kg + Fentanyl 2 mcg/kg','Etomidate 0.3 mg/kg + Succinylcholine 1.5 mg/kg + Remifentanil','Midazolam 0.3 mg/kg + Rocuronium 0.6 mg/kg'],
 ans:0, exp:'根據 ASA 和 ACOG 指南，Propofol 2–2.8 mg/kg + Succinylcholine 1–1.5 mg/kg 是緊急剖腹產全身麻醉的標準 RSI 方案。胎兒娩出前通常不給鴉片類，以避免新生兒呼吸抑制。Midazolam 起效慢、Rocuronium 0.6 mg/kg 劑量不足。高劑量 Rocuronium 1.2 mg/kg + Sugammadex 備用是 Succinylcholine 禁忌時的替代方案。'},

{cat:'clinical', diff:2, q:'【術中惡性高熱辨識與處理】\n8歲男孩在 Sevoflurane 麻醉下進行扁桃體切除術。術中 30 分鐘後，呼氣末 CO₂ 從 35 突升至 65 mmHg，心率從 90 升至 150 次/分，體溫 37.8°C。最優先的處理步驟是？',
 opts:['增加分鐘通氣量並觀察','立即停止 Sevoflurane，改用 TIVA，給予 Dantrolene 2.5 mg/kg','給予 Esmolol 控制心率','給予物理降溫並繼續手術'],
 ans:1, exp:'呼氣末 CO₂ 急劇升高（儘管通氣量正常）+ 心動過速 = 高度懷疑惡性高熱。體溫升高可能是較晚出現的表現，不應等待體溫升高才處理。最優先步驟：①立即停止 Sevoflurane ②改用 TIVA（Propofol + Opioid）③給予 Dantrolene 2.5 mg/kg IV（可重複至 10 mg/kg）④過度通氣降 CO₂ ⑤積極降溫 ⑥監測電解質。單純增加通氣量（A）會延誤治療，Esmolol 不解決根本問題。'},

{cat:'clinical', diff:2, q:'【ICU Propofol 鎮靜併發症】\n62歲男性，ARDS，ICU 機械通氣第 4 天。Propofol 60 mcg/kg/min 維持鎮靜。今日出現：不明原因代謝性酸中毒（pH 7.25，乳酸 6.2 mmol/L）、CK 15,000 U/L、三酸甘油酯正常、心電圖新發右束支傳導阻滯。最可能的診斷和最優先處理是？',
 opts:['敗血症惡化 → 加強抗生素','PRIS → 立即停止 Propofol，改用替代鎮靜劑','急性心肌梗塞 → 緊急心導管','橫紋肌溶解（非藥物相關）→ 積極補液'],
 ans:1, exp:'代謝性酸中毒 + 乳酸升高 + CK 升高（橫紋肌溶解）+ 新發傳導異常，在 Propofol 長期輸注背景下 = PRIS。注意：三酸甘油酯正常不能排除 PRIS — 最新研究顯示典型特徵（高三酸甘油酯、發燒）在 >95% 的 PRIS 病例中缺失。最優先處理：立即停止 Propofol，改用 Dexmedetomidine 或 Midazolam。'},

{cat:'clinical', diff:3, q:'【Fentanyl 引起的胸壁僵硬】\n誘導過程中快速推注 Fentanyl 5 mcg/kg 後，患者出現嚴重胸壁僵硬，面罩通氣困難。此時尚未給予肌鬆劑。最佳處理是？',
 opts:['給予 Naloxone 0.4 mg 逆轉 Fentanyl','立即給予 Succinylcholine 或 Rocuronium 進行肌鬆','嘗試更大力的面罩通氣','等待 Fentanyl 效果消退'],
 ans:1, exp:'Fentanyl 快速推注引起的胸壁僵硬（木胸症候群）是危及生命的緊急情況，因為無法通氣。最有效處理是立即給予神經肌肉阻滯劑（Succinylcholine 1.5 mg/kg 或 Rocuronium 1.2 mg/kg）解除肌肉僵硬後插管通氣。Naloxone 起效太慢且會逆轉鎮痛；等待缺氧無法接受；更大力面罩通氣通常無效。'},

{cat:'clinical', diff:2, q:'【術中支氣管痙攣處理】\n50歲女性，全麻（Propofol + Sevoflurane + Rocuronium）下進行膽囊切除術。插管後出現嚴重支氣管痙攣，氣道壓急劇升高，SpO₂ 88%。最合適的處理是？',
 opts:['加深 Sevoflurane + 給予 Salbutamol 霧化','立即拔管','給予 Sugammadex 逆轉 Rocuronium','改用 Desflurane'],
 ans:0, exp:'術中支氣管痙攣的處理：①加深麻醉（Sevoflurane 本身具有支氣管擴張作用）②給予 Salbutamol 霧化 ③排除機械原因（管位、分泌物）④必要時 IV Epinephrine。Desflurane 有氣道刺激性，會加重支氣管痙攣，絕對禁忌。拔管在深度支氣管痙攣時可能加重喉痙攣。Sugammadex 不能解決支氣管痙攣。'},

{cat:'clinical', diff:3, q:'【過敏性休克的處理順序】\n35歲女性，全麻誘導後 2 分鐘（已給予 Propofol + Fentanyl + Rocuronium），出現嚴重低血壓（BP 60/30）、全身蕁麻疹、支氣管痙攣。高度懷疑過敏性休克。最正確的處理順序是？',
 opts:['Epinephrine IM → 補液 → 停藥 → Sugammadex','停止所有可疑藥物 → Epinephrine IV → 補液 → 考慮 Sugammadex','Hydrocortisone IV → Diphenhydramine → Epinephrine','Sugammadex 16 mg/kg → Epinephrine → 補液'],
 ans:1, exp:'全麻中過敏性休克（AHA 2025 指引）：①停止所有可疑藥物 ②Epinephrine IV 10–50 μg（已有靜脈通路，IV 優於 IM）③大量補液 20–30 mL/kg ④考慮 Sugammadex（若懷疑 Rocuronium 為過敏原，可包裹移除）。Hydrocortisone 和 Diphenhydramine 已不再列為即時處理，起效慢，不能逆轉低血壓。過敏性休克死亡的最常見可預防原因是延遲給予 Epinephrine。'},

{cat:'clinical', diff:2, q:'【高齡合併心血管疾病的誘導】\n82歲女性（50 kg），ASA III，合併冠心病和輕度認知障礙，需要全麻進行髖關節置換術。以下哪種誘導方案最合適？',
 opts:['Propofol 2.5 mg/kg 快速推注','Propofol 1–1.5 mg/kg 緩慢滴定 + Fentanyl 1 mcg/kg','Etomidate 0.3 mg/kg + Fentanyl 2 mcg/kg','Ketamine 2 mg/kg + Midazolam 2 mg'],
 ans:1, exp:'老年患者對 Propofol 敏感性增加，標準劑量（2.5 mg/kg）可能導致嚴重低血壓。減量 Propofol（1–1.5 mg/kg）緩慢滴定是最安全方法；小劑量 Fentanyl 可減少 Propofol 需求量。Etomidate 雖血流動力學穩定，但在擇期手術中腎上腺抑制和肌陣攣問題使其非首選。Ketamine 引起心動過速和高血壓，對冠心病患者不利。'},

{cat:'clinical', diff:2, q:'【末期腎病的鴉片類選擇】\n58歲男性，終末期腎病（eGFR 8 mL/min），需要全身麻醉進行動靜脈瘻管手術（預計 2 小時）。以下哪種鴉片類藥物最適合術中鎮痛？',
 opts:['Morphine — 經典鴉片類','Fentanyl — 效力強劑量小','Remifentanil — 代謝不受腎功能影響','Meperidine — 鎮痛加鎮靜'],
 ans:2, exp:'Remifentanil 由血漿和組織中的非特異性酯酶代謝，藥代動力學完全不受腎功能影響，是終末期腎病患者的理想選擇。Morphine 的活性代謝物（M6G）經腎排泄，在腎衰竭中蓄積，可導致延長呼吸抑制。Meperidine 的代謝物 Normeperidine 在腎衰竭中蓄積，可引起癲癇發作，禁忌使用。Fentanyl 雖比 Morphine 安全，但長時間使用仍可能蓄積。'},

{cat:'clinical', diff:3, q:'【創傷性腦損傷的鎮靜選擇】\n40歲男性，嚴重 TBI（GCS 6），ICP 25–30 mmHg。已使用 Propofol 40 mcg/kg/min 和 Fentanyl 輸注，ICP 仍未控制。最合適的下一步是？',
 opts:['增加 Propofol 至 80 mcg/kg/min','加用 Ketamine 輸注作為輔助鎮靜','改用 Midazolam 輸注替代 Propofol','立即給予 Pentobarbital 昏迷治療'],
 ans:1, exp:'最新證據顯示 Ketamine 在 TBI 患者中不會增加 ICP，反而可能減少皮質擴散去極化事件，且具有鎮痛作用可減少鴉片類需求。加用低劑量 Ketamine 輸注是合理的輔助選擇。增加 Propofol 至 80 mcg/kg/min 超過推薦最大劑量（50 mcg/kg/min），PRIS 風險顯著增加。Pentobarbital 昏迷是最後手段（Tier 3），應在所有其他措施失敗後才考慮。'},

{cat:'clinical', diff:2, q:'【兒科吸入誘導的藥物選擇】\n4歲男孩，需要全麻進行腹股溝疝修補術。靜脈通路困難，計劃面罩吸入誘導。以下哪種方案最合適？',
 opts:['Desflurane — 血氣分配係數最低起效最快','Sevoflurane — 氣味宜人氣道刺激小','Isoflurane — 最經濟實惠','Propofol 直腸給藥誘導'],
 ans:1, exp:'Sevoflurane 是兒科面罩吸入誘導的金標準。氣味宜人（類似水果香味）、無氣道刺激，兒童接受度高，可在無靜脈通路下順利誘導。Desflurane 雖血氣分配係數最低，但刺激性氣味會引起咳嗽、喉痙攣和支氣管痙攣，絕對不適合吸入誘導（尤其兒童）。吸入誘導的關鍵不僅是起效速度，更重要是氣道耐受性。'},

{cat:'clinical', diff:3, q:'【重症肌無力的肌鬆劑選擇】\n45歲女性，重症肌無力（Osserman IIb），需要全麻進行胸腺切除術。以下關於肌鬆劑的敘述，哪項最正確？',
 opts:['Succinylcholine 效果正常，可安全使用標準劑量','應完全避免使用任何肌鬆劑','非去極化肌鬆劑（如 Rocuronium）敏感性增加，需減量，並備好 Sugammadex','應使用雙倍劑量 Rocuronium 以確保完全肌鬆'],
 ans:2, exp:'重症肌無力患者神經肌肉接頭的乙醯膽鹼受體數量減少，導致對非去極化肌鬆劑敏感性增加（需減量至正常劑量 1/3–1/2），對 Succinylcholine 則有抵抗性（反應不可預測）。Sugammadex 的出現使 Rocuronium 成為 MG 患者理想肌鬆劑，可快速、完全、可靠逆轉，避免術後殘餘肌鬆導致呼吸衰竭。核心原則：少量多次、密切監測、確保完全逆轉。'},

{cat:'clinical', diff:2, q:'【Propofol 與 Fentanyl 的藥物交互作用】\n全麻誘導中，先給予 Fentanyl 2 mcg/kg，再給予 Propofol。與單獨使用 Propofol 相比，以下哪項最可能發生？',
 opts:['Propofol 的誘導劑量需要增加','Propofol 的誘導劑量可以減少，但低血壓和心動過緩風險增加','兩藥之間無交互作用','Fentanyl 會拮抗 Propofol 的效果'],
 ans:1, exp:'Fentanyl 與 Propofol 之間存在協同作用：先給 Fentanyl 可減少 Propofol 誘導劑量約 30–50%（共同誘導效應）。但兩藥合用會增加低血壓和心動過緩風險，因為兩者均抑制交感神經張力。臨床應用：老年患者和血流動力學不穩定患者風險更大，應緩慢滴定，並備好 Ephedrine 或 Phenylephrine。「合用可以減量」但「減量不等於無風險」。'},

{cat:'clinical', diff:3, q:'【雞蛋過敏合併 MH 家族史】\n38歲女性，已知對雞蛋嚴重過敏，且有惡性高熱家族史，需要全麻進行子宮肌瘤切除術。以下哪種方案最安全？',
 opts:['Propofol TIVA + Rocuronium + Fentanyl','Etomidate + Rocuronium + Remifentanil（全靜脈麻醉）','Sevoflurane + Rocuronium + Fentanyl','Ketamine + Midazolam + Rocuronium（全靜脈麻醉）'],
 ans:1, exp:'系統性排除法：① 雞蛋嚴重過敏反應史 → Propofol 含卵磷脂，風險效益比不利 → 排除 A ② MH 家族史 → 禁用所有揮發性麻醉劑和 Succinylcholine → 排除 C。注意：最新 BJA 綜述指出，雞蛋過敏通常不是 Propofol 禁忌，但對有嚴重過敏性休克史者仍應謹慎評估。Etomidate + Rocuronium + Remifentanil 全靜脈麻醉：Etomidate 不含卵磷脂，全靜脈避免 MH，Rocuronium 安全，Remifentanil 精確鎮痛。'},

{cat:'clinical', diff:2, q:'【苯二氮䓬類 + 鴉片類的致命組合】\n術後恢復室，65歲男性（COPD），使用 Fentanyl PCA。護理師發現患者焦慮，請求給予 Midazolam 2 mg IV。以下哪項是最重要的考量？',
 opts:['可以安全給予，兩藥無交互作用','合用可能導致深度鎮靜、呼吸抑制甚至死亡，需極度謹慎並密切監測','應先停止 Fentanyl PCA 再給 Midazolam','Midazolam 在術後恢復室禁忌使用'],
 ans:1, exp:'苯二氮䓬類 + 鴉片類是 FDA 黑框警告的致命組合。此患者的高危因素：65 歲（對兩類藥物敏感性增加）、COPD（基線呼吸功能受損）、正在使用 Fentanyl PCA。焦慮應先排除其他原因（疼痛控制不足、低氧、譫妄）。若必須使用，應極低劑量（0.5–1 mg）並持續監測 SpO₂、呼吸頻率和意識狀態。術後恢復室是此交互作用導致呼吸驟停的高發場所。'},

{cat:'clinical', diff:3, q:'【殘餘肌鬆的逆轉決策】\n腹腔鏡手術結束，使用 Rocuronium 0.6 mg/kg 已過 90 分鐘。TOF（四個成串刺激）T4/T1 比值為 0.6。外科醫師催促拔管。最正確的處理是？',
 opts:['TOF 比值 0.6 已足夠，可以安全拔管','給予 Neostigmine 50 mcg/kg + Glycopyrrolate，等待 TOF ≥ 0.9 再拔管','給予 Sugammadex 2 mg/kg，等待 TOF ≥ 0.9 再拔管','不需要逆轉，直接拔管並在恢復室觀察'],
 ans:2, exp:'TOF 比值 0.6 代表仍有顯著殘餘肌鬆，安全拔管標準是 TOF ≥ 0.9。Sugammadex 2 mg/kg 可在約 2–3 分鐘內將 TOF 恢復至 ≥ 0.9（ASA 2023 強烈建議，優於 Neostigmine）。Cochrane 統合分析顯示 Sugammadex 逆轉時間顯著更短（2.0 vs 12.9 分鐘），心動過緩風險更低（RR 0.16）。在外科催促的壓力下，Sugammadex 是更安全的選擇，永遠不要在 TOF < 0.9 時拔管。'},

{cat:'clinical', diff:3, q:'【多器官衰竭危重症的綜合麻醉決策】\n60歲男性，敗血性休克（MAP 58，Norepinephrine 0.5 mcg/kg/min），合併 ARDS（P/F ratio 80）、急性腎損傷（Cr 3.2 mg/dL），疑似腹腔膿瘍需要緊急手術。以下哪種方案最合適？',
 opts:['Propofol 2 mg/kg + Sevoflurane 維持 + Morphine + Succinylcholine','Ketamine 1–1.5 mg/kg + Rocuronium 1.2 mg/kg → Propofol/Ketamine 低劑量維持 + Remifentanil 輸注','Etomidate 0.3 mg/kg + Succinylcholine 1.5 mg/kg → Sevoflurane 維持 + Fentanyl','Midazolam 0.3 mg/kg + Rocuronium 0.6 mg/kg → Midazolam 輸注 + Morphine'],
 ans:1, exp:'方案 B 的優勢：Ketamine 1–1.5 mg/kg（減量）在敗血性休克中提供相對穩定的血流動力學；Rocuronium 1.2 mg/kg 為 RSI 劑量，無高鉀血症風險；低劑量 Propofol/Ketamine 維持可降低各自的 PRIS 和兒茶酚胺耗竭風險；Remifentanil 代謝不受腎功能影響，且超短效允許精確滴定。A 的問題：Propofol 全劑量誘導低血壓、Morphine 在腎損傷中蓄積、Succinylcholine 在危重症有高鉀血症風險。C 的問題：敗血症患者使用 Etomidate 有腎上腺抑制爭議，Fentanyl 不如 Remifentanil 理想。D 的問題：Midazolam 在休克中引起嚴重低血壓，Morphine 腎損傷禁忌。'},

{cat:'advanced', diff:2, q:'【Remimazolam 用於高風險 TAVR 鎮靜】\n78歲男性，BMI 18，ASA IV，嚴重主動脈瓣狹窄（瓣口面積 0.7 cm²），需行 TAVR 術中鎮靜，希望維持自主呼吸和血流動力學穩定。以下哪種鎮靜方案最適合？',

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let selectedCats = new Set();
let mode = 'timed';
let quizQuestions = [];
let current = 0;
let score = 0;
let timerInterval = null;
let timeLeft = 30;
let answered = false;
let timeUsed = [];
let results = [];
let retryMode = false;

// ── font size ──
function setFont(btn) {
  document.querySelectorAll('.font-toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.body.className = document.body.className.replace(/fs-\w+/g, '').trim();
  document.body.classList.add(btn.dataset.fs);
}
document.body.classList.add('fs-md');

// ═══════════════════════════════════════════
//  WELCOME
// ═══════════════════════════════════════════
function buildCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.style.setProperty('--accent', cat.color);
    card.dataset.id = cat.id;
    card.innerHTML = `
      <div class="cat-label">${cat.label}</div>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-eng">${cat.eng}</div>
      <div class="cat-count">${cat.count} 題</div>
    `;
    card.onclick = () => toggleCat(cat.id, card);
    grid.appendChild(card);
  });
}

function toggleCat(id, card) {
  if (selectedCats.has(id)) {
    selectedCats.delete(id);
    card.classList.remove('selected');
  } else {
    selectedCats.add(id);
    card.classList.add('selected');
  }
  document.getElementById('startBtn').disabled = selectedCats.size === 0;
}

function selectMode(btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  mode = btn.dataset.mode;
}

// ═══════════════════════════════════════════
//  QUIZ LOGIC
// ═══════════════════════════════════════════
function startQuiz() {
  quizQuestions = ALL_QUESTIONS.filter(q => selectedCats.has(q.cat));
  quizQuestions = quizQuestions.sort(() => Math.random() - 0.5);
  current = 0; score = 0; timeUsed = []; results = []; retryMode = false;
  showScreen('quiz');
  renderQuestion();
}

function getQuestionTimer(q) {
  const cat = CATEGORIES.find(c => c.id === q.cat);
  return cat ? cat.timer : 30;
}

function getQuestionPoints(q) {
  return q.cat === 'clinical' ? 5 : 1;
}

function showScreen(id) {
  ['welcome','quiz','results'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

function renderQuestion() {
  answered = false;
  const q = quizQuestions[current];
  const total = quizQuestions.length;
  const pct = (current / total) * 100;

  document.getElementById('qIndex').textContent =
    String(current+1).padStart(2,'0') + ' / ' + String(total).padStart(2,'0');
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('scoreBadge').textContent = score + ' 分';

  const cat = CATEGORIES.find(c => c.id === q.cat);

  // difficulty badge for clinical questions
  let diffHtml = '';
  if (q.diff) {
    const diffMap = { 1:['基礎','diff-1'], 2:['進階','diff-2'], 3:['專家','diff-3'] };
    const [label, cls] = diffMap[q.diff] || ['',''];
    diffHtml = `<span class="diff-badge ${cls}">${'⭐'.repeat(q.diff)} ${label}</span>`;
  }

  // render newlines in question text
  const qText = (q.q || '').replace(/\n/g, '<br>');

  const body = document.getElementById('quizBody');
  body.innerHTML = `
    <div class="cat-badge" style="--accent:${cat.color}">${cat.name} · ${cat.label}</div>${diffHtml ? '<div style="margin-bottom:16px">' + diffHtml + '</div>' : ''}
    <div class="question-text">${qText}</div>
    <div class="options-list" id="optsList"></div>
  `;

  const opts = document.getElementById('optsList');
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-key">${String.fromCharCode(65+i)}</span><span>${opt}</span>`;
    btn.onclick = () => chooseAnswer(i);
    opts.appendChild(btn);
  });

  // timer — use per-category timer length
  clearInterval(timerInterval);
  if (mode === 'timed') {
    timeLeft = getQuestionTimer(q);
    updateTimer();
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimer();
      if (timeLeft <= 0) { clearInterval(timerInterval); autoTimeout(); }
    }, 1000);
  } else {
    document.getElementById('timerDisplay').textContent = '—';
    document.getElementById('timerDisplay').className = 'timer-display';
  }
}

function updateTimer() {
  const q = quizQuestions[current];
  const maxTime = getQuestionTimer(q);
  const el = document.getElementById('timerDisplay');
  el.textContent = timeLeft + 's';
  const warnAt = Math.floor(maxTime * 0.33);
  const dangerAt = Math.floor(maxTime * 0.17);
  el.className = 'timer-display' + (timeLeft <= dangerAt ? ' danger' : timeLeft <= warnAt ? ' warn' : '');
}

function chooseAnswer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  const maxTime = getQuestionTimer(quizQuestions[current]);
  const used = mode === 'timed' ? maxTime - timeLeft : 0;
  timeUsed.push(used);

  const q = quizQuestions[current];
  const correct = idx === q.ans;
  const pts = getQuestionPoints(q);
  if (correct) score += pts;

  results.push({ q, userAns: idx, correct });

  // style buttons
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add(correct ? 'correct' : 'missed');
    else if (i === idx && !correct) btn.classList.add('wrong');
  });

  // flash
  const flashMsg = correct ? (pts > 1 ? `正確！+${pts} 分` : '正確！') : '答錯了';
  showFlash(flashMsg, correct ? 'correct' : 'wrong');

  // explanation
  const box = document.createElement('div');
  box.className = 'explanation-box';
  box.style.borderLeftColor = correct ? 'var(--accent-green)' : 'var(--accent-red)';
  box.innerHTML = `
    <div class="explanation-label">EXPLANATION</div>
    <div class="explanation-text">${q.exp}</div>
  `;
  document.getElementById('quizBody').appendChild(box);

  // next button
  const nextBtn = document.createElement('button');
  nextBtn.className = 'next-btn';
  nextBtn.innerHTML = current < quizQuestions.length - 1
    ? '下一題 <span class="arrow">→</span>'
    : '查看結果 <span class="arrow">→</span>';
  nextBtn.onclick = nextQuestion;
  document.getElementById('quizBody').appendChild(nextBtn);

  document.getElementById('scoreBadge').textContent = score + ' 分';
}

function autoTimeout() {
  if (answered) return;
  answered = true;
  const maxTime = getQuestionTimer(quizQuestions[current]);
  timeUsed.push(maxTime);
  const q = quizQuestions[current];
  results.push({ q, userAns: -1, correct: false });

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('missed');
  });

  showFlash('時間到！', 'wrong');

  const box = document.createElement('div');
  box.className = 'explanation-box';
  box.style.borderLeftColor = 'var(--accent-amber)';
  box.innerHTML = `
    <div class="explanation-label">EXPLANATION</div>
    <div class="explanation-text">${q.exp}</div>
  `;
  document.getElementById('quizBody').appendChild(box);

  const nextBtn = document.createElement('button');
  nextBtn.className = 'next-btn';
  nextBtn.innerHTML = current < quizQuestions.length - 1
    ? '下一題 <span class="arrow">→</span>'
    : '查看結果 <span class="arrow">→</span>';
  nextBtn.onclick = nextQuestion;
  document.getElementById('quizBody').appendChild(nextBtn);
}

function nextQuestion() {
  current++;
  if (current >= quizQuestions.length) {
    showResults();
  } else {
    renderQuestion();
    document.getElementById('quizBody').scrollIntoView({ behavior: 'smooth' });
  }
}

function showFlash(msg, type) {
  const old = document.querySelector('.feedback-flash');
  if (old) old.remove();
  const el = document.createElement('div');
  el.className = 'feedback-flash ' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1900);
}

// ═══════════════════════════════════════════
//  RESULTS
// ═══════════════════════════════════════════
function showResults() {
  clearInterval(timerInterval);
  showScreen('results');

  const total = quizQuestions.length;
  const maxScore = quizQuestions.reduce((s, q) => s + getQuestionPoints(q), 0);
  const pct = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
  const correctCount = results.filter(r => r.correct).length;
  const avgTime = timeUsed.length ? Math.round(timeUsed.reduce((a,b)=>a+b,0)/timeUsed.length) : 0;

  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultDenom').textContent = '/ ' + maxScore;
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = total - correctCount;
  document.getElementById('statTime').textContent = mode === 'timed' ? avgTime + 's' : '—';

  // rank
  const ranks = [
    { min:86, label:'麻醉大師', sub:'臨床藥理掌握精熟，達到指導者水準', color:'var(--accent-cyan)' },
    { min:71, label:'資深臨床護理師', sub:'藥理知識扎實，具備良好臨床判斷力', color:'var(--accent-green)' },
    { min:57, label:'進階學習者', sub:'核心概念已熟悉，建議加強不良反應識別', color:'var(--accent-amber)' },
    { min:0,  label:'繼續努力', sub:'建議系統性複習各藥物分類後再次測驗', color:'var(--accent-red)' },
  ];
  const rank = ranks.find(r => pct >= r.min);
  document.getElementById('rankBadge').textContent = rank.label;
  document.getElementById('rankBadge').style.color = rank.color;
  document.getElementById('rankSub').textContent = rank.sub + ' · 正確率 ' + pct + '%';

  // ring
  const ring = document.getElementById('ringFill');
  const circumference = 440;
  ring.style.strokeDashoffset = circumference;
  ring.style.stroke = rank.color;
  setTimeout(() => {
    ring.style.strokeDashoffset = circumference - (pct / 100) * circumference;
  }, 100);

  // category breakdown
  buildBreakdown();

  // review
  buildReview();
}

function buildBreakdown() {
  const wrap = document.getElementById('catBreakdown');
  wrap.innerHTML = '<div class="breakdown-title">PERFORMANCE BY CATEGORY</div>';

  const usedCats = [...new Set(quizQuestions.map(q => q.cat))];
  usedCats.forEach(catId => {
    const cat = CATEGORIES.find(c => c.id === catId);
    const catQs = results.filter(r => r.q.cat === catId);
    const catCorrect = catQs.filter(r => r.correct).length;
    const catPct = catQs.length ? Math.round((catCorrect / catQs.length) * 100) : 0;

    const row = document.createElement('div');
    row.className = 'breakdown-row';
    row.innerHTML = `
      <span class="breakdown-cat">${cat.name}</span>
      <div class="breakdown-bar-wrap">
        <div class="breakdown-bar-fill" style="width:0%;background:${cat.color}" data-pct="${catPct}"></div>
      </div>
      <span class="breakdown-pct">${catPct}%</span>
    `;
    wrap.appendChild(row);
  });

  setTimeout(() => {
    document.querySelectorAll('.breakdown-bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 200);
}

function buildReview() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  const wrong = results.filter(r => !r.correct);

  if (wrong.length === 0) {
    document.querySelector('.review-header-text').textContent = '全部答對！';
    return;
  }

  document.querySelector('.review-header-text').textContent =
    `WRONG ANSWERS REVIEW · ${wrong.length} 題`;

  wrong.forEach(r => {
    const item = document.createElement('div');
    item.className = 'review-item';
    const userLabel = r.userAns === -1 ? '（超時未答）' : r.q.opts[r.userAns];
    item.innerHTML = `
      <div class="review-q">${r.q.q}</div>
      <div class="review-answer-row">
        <span class="review-answer user-wrong">你的答案：${userLabel}</span>
        <span class="review-answer correct-ans">正確答案：${r.q.opts[r.q.ans]}</span>
      </div>
      <div class="explanation-text" style="font-size:12px;margin-top:10px;color:var(--text-muted);font-family:'Noto Sans TC',sans-serif">${r.q.exp}</div>
    `;
    list.appendChild(item);
  });
}

function toggleReview() {
  const list = document.getElementById('reviewList');
  const toggle = document.getElementById('reviewToggle');
  list.classList.toggle('open');
  toggle.classList.toggle('open');
}

function retryWrong() {
  const wrong = results.filter(r => !r.correct).map(r => r.q);
  if (wrong.length === 0) return;
  quizQuestions = wrong.sort(() => Math.random() - 0.5);
  current = 0; score = 0; timeUsed = []; results = []; retryMode = true;
  showScreen('quiz');
  renderQuestion();
}

function backToWelcome() {
  selectedCats.clear();
  document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('startBtn').disabled = true;
  showScreen('welcome');
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
buildCatGrid();
document.getElementById('startBtn').disabled = true;
</script>
</body>
